  <head>
    <meta charset="utf-8" />

    <title>나의 진짜 성향 테스트 (MBTI 기반)</title>
    <style>
      :root {
        --bg: #f4f1ec;
        --card: #ffffff;
        --ink: #1f1d1a;
        --muted: #6f655c;
        --accent: #9edbd5;
        --accent-strong: #63b9b0;
        --accent-dark: #2c6c69;
        --bar: #efe9e2;
        --shadow: 0 20px 50px rgba(28, 22, 16, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "NanumSquare", "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic",
          Arial, sans-serif;
        background: var(--bg);
        color: var(--ink);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px 16px;
      }

      .phone-frame {
        width: min(420px, 92vw);
        min-height: 78vh;
        background: var(--card);
        border-radius: 32px;
        box-shadow: var(--shadow);
        padding: 26px 22px 28px;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .header {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .title {
        font-size: 22px;
        font-weight: 800;
        letter-spacing: -0.02em;
      }

      .progress-wrap {
        width: 100%;
        height: 12px;
        background: var(--bar);
        border-radius: 999px;
        overflow: hidden;
      }

      .progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--accent), #c9f2ee);
        transition: width 0.35s ease;
      }

      .status {
        font-size: 13px;
        color: var(--muted);
      }

      .card {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 22px;
        min-height: 320px;
      }

      .question {
        font-size: 22px;
        font-weight: 700;
        line-height: 1.4;
      }

      .choices {
        display: grid;
        gap: 14px;
      }

      .choice-btn {
        border: 2px solid transparent;
        background: #f8f6f3;
        padding: 18px 18px;
        border-radius: 18px;
        font-size: 16px;
        font-weight: 600;
        text-align: left;
        cursor: pointer;
        transition: transform 0.12s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      }

      .choice-btn:hover {
        transform: translateY(-2px);
        border-color: var(--accent);
        box-shadow: 0 10px 20px rgba(99, 185, 176, 0.18);
      }

      .choice-btn:active {
        transform: scale(0.97);
      }

      .choice-label {
        font-weight: 800;
        color: var(--accent-dark);
        margin-right: 8px;
      }

      .fade-enter {
        opacity: 0;
        transform: translateY(14px);
      }

      .fade-enter-active {
        opacity: 1;
        transform: translateY(0);
        transition: opacity 0.35s ease, transform 0.35s ease;
      }

      .fade-exit {
        opacity: 1;
        transform: translateY(0);
      }

      .fade-exit-active {
        opacity: 0;
        transform: translateY(-12px);
        transition: opacity 0.25s ease, transform 0.25s ease;
      }

      .loading {
        display: none;
        text-align: center;
        padding: 20px 8px;
      }

      .loading-title {
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 10px;
      }

      .loading-sub {
        color: var(--muted);
        font-size: 15px;
        margin-bottom: 16px;
      }

      .dots {
        display: inline-flex;
        gap: 6px;
      }

      .dots span {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--accent-strong);
        animation: bounce 0.9s infinite ease-in-out;
      }

      .dots span:nth-child(2) {
        animation-delay: 0.15s;
      }

      .dots span:nth-child(3) {
        animation-delay: 0.3s;
      }

      @keyframes bounce {
        0%,
        100% {
          transform: translateY(0);
          opacity: 0.6;
        }
        50% {
          transform: translateY(-8px);
          opacity: 1;
        }
      }

      .result {
        display: none;
        text-align: left;
        padding: 6px 4px 0;
      }

      .result h2 {
        margin: 0 0 10px;
        font-size: 26px;
        text-align: center;
      }

      .nickname {
        font-size: 18px;
        font-weight: 700;
        color: var(--accent-dark);
        text-align: center;
        margin: 0 0 14px;
      }

      .result-block {
        background: #f7f5f1;
        border-radius: 16px;
        padding: 14px 14px;
        margin-bottom: 12px;
      }

      .result-block h3 {
        margin: 0 0 8px;
        font-size: 15px;
        color: var(--accent-dark);
      }

      .result-block p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
        font-size: 14px;
        white-space: pre-line;
      }

      .restart {
        display: inline-block;
        padding: 12px 22px;
        background: var(--accent-strong);
        color: #fff;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 700;
        border: none;
        cursor: pointer;
        transition: transform 0.12s ease, box-shadow 0.2s ease;
        width: 100%;
        margin-top: 6px;
      }

      .restart:active {
        transform: scale(0.97);
      }

      .footer-note {
        font-size: 12px;
        color: var(--muted);
        text-align: center;
      }

      @media (max-width: 420px) {
        .phone-frame {
          min-height: 82vh;
        }
        .question {
          font-size: 20px;
        }
      }
    </style>

          best: "INFP - 당신의 현실 감각이 상대의 이상을 구체화해주고, 상대의 따뜻함이 당신의 직선성을 부드럽게 해줘요.",
          caution:
            "INFP - 같은 조합이라도 방식이 안 맞을 수 있어요. 평가 대신 공감 먼저 시도해보세요.",
        },
        ESFJ: {
          nickname: "사람 챙기는 진행자",
          detail:
            "모두가 편안하도록 분위기를 조율하는 타입이에요.\n사람의 표정과 반응을 잘 읽고 배려가 깊어요.\n관계를 유지하는 데 에너지를 쓰는 편이에요.\n책임감이 있어 약속과 일정도 잘 챙겨요.\n다만 갈등이 생기면 스스로를 탓할 때가 있어요.\n따뜻한 말 한마디가 관계를 크게 움직인다고 믿어요.",
          best: "ISTP - 당신의 배려가 상대를 편하게 하고, 상대의 현실감각이 당신에게 든든함을 줘요.",
          caution:
            "INTP - 감정 표현 차이로 서운함이 생길 수 있어요. 필요한 감정 신호를 먼저 알려주세요.",
        },
        ENFJ: {
          nickname: "열정 넘치는 코치",
          detail:
            "사람들의 가능성을 끌어내는 데 능한 타입이에요.\n공감과 리더십을 동시에 발휘하는 편이에요.\n관계 속에서 성장과 의미를 중요하게 봐요.\n상대의 장점을 발견해 칭찬으로 이끄는 힘이 있어요.\n과하게 챙기다 스스로 지칠 수 있어요.\n진심과 행동이 일치할 때 가장 빛나요.",
          best: "INFP - 서로의 마음을 단단히 지지해주는 따뜻한 조합이에요.",
          caution:
            "ISTP - 속도와 감정 표현 차이가 커요. 기대치를 명확히 공유하는 게 중요해요.",
        },
        ENTJ: {
          nickname: "목표 직진 지휘관",
          detail:
            "결과와 성과를 중심으로 빠르게 결정하는 타입이에요.\n큰 목표를 세우고 전략적으로 움직이는 데 강해요.\n리더십이 강하고 주도적으로 상황을 정리해요.\n효율을 중시해 불필요한 감정 소모를 줄이려 해요.\n직설적인 표현으로 오해가 생길 수 있어요.\n신뢰가 쌓이면 누구보다 든든한 파트너가 돼요.",
          best: "ISFP - 당신의 추진력이 상대의 감각을 현실로 만들고, 상대의 섬세함이 당신의 속도를 다듬어줘요.",
          caution:
            "ISFJ - 속도와 방식 차이로 답답함이 생길 수 있어요. 역할 분담과 페이스 합의가 필요해요.",
        },
      };

      const progressBar = document.getElementById("progressBar");
      const statusText = document.getElementById("statusText");
      const questionCard = document.getElementById("questionCard");
      const questionText = document.getElementById("questionText");
      const choiceA = document.getElementById("choiceA");
      const choiceB = document.getElementById("choiceB");
      const loadingCard = document.getElementById("loadingCard");
      const resultCard = document.getElementById("resultCard");
      const resultType = document.getElementById("resultType");
      const resultNickname = document.getElementById("resultNickname");
      const resultDetail = document.getElementById("resultDetail");
      const resultBest = document.getElementById("resultBest");
      const resultCaution = document.getElementById("resultCaution");
      const restartBtn = document.getElementById("restartBtn");

      let questions = [];
      let current = 0;
      const scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
      let isAnimating = false;

      function shuffle(array) {
        for (let i = array.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
      }

      function buildQuestionSet() {
        const picked = [];
        const groups = [
          { key: "EI", count: 5 },
          { key: "SN", count: 5 },
          { key: "TF", count: 5 },
          { key: "JP", count: 5 },
        ];

        groups.forEach((group) => {
          const pool = shuffle([...questionBank[group.key]]);
          picked.push(...pool.slice(0, group.count));
        });

        return shuffle(picked);
      }

      function resetScores() {
        Object.keys(scores).forEach((k) => (scores[k] = 0));
      }

      function updateProgress() {
        const progress = ((current + 1) / questions.length) * 100;
        progressBar.style.width = `${progress}%`;
        statusText.textContent = `${current + 1} / ${questions.length}`;
      }

      function setQuestion(index) {
        const q = questions[index];
        questionText.textContent = q.text;
        choiceA.innerHTML = `<span class="choice-label">A</span>${q.A}`;
        choiceB.innerHTML = `<span class="choice-label">B</span>${q.B}`;
        updateProgress();
      }

      function animateOut(callback) {
        questionCard.classList.remove("fade-enter", "fade-enter-active");
        questionCard.classList.add("fade-exit");
        requestAnimationFrame(() => {
          questionCard.classList.add("fade-exit-active");
        });
        setTimeout(() => {
          questionCard.classList.remove("fade-exit", "fade-exit-active");
          callback();
        }, 260);
      }

      function animateIn() {
        questionCard.classList.add("fade-enter");
        requestAnimationFrame(() => {
          questionCard.classList.add("fade-enter-active");
        });
        setTimeout(() => {
          questionCard.classList.remove("fade-enter", "fade-enter-active");
        }, 360);
      }

      function handleChoice(choice) {
        if (isAnimating) return;
        isAnimating = true;
        const q = questions[current];
        const picked = choice === "A" ? q.mapA : q.mapB;
        scores[picked] += 1;

        animateOut(() => {
          current += 1;
          if (current < questions.length) {
            setQuestion(current);
            animateIn();
            isAnimating = false;
          } else {
            showLoading();
          }
        });
      }

      function computeType() {
        return (
          (scores.E >= scores.I ? "E" : "I") +
          (scores.S >= scores.N ? "S" : "N") +
          (scores.T >= scores.F ? "T" : "F") +
          (scores.J >= scores.P ? "J" : "P")
        );
      }

      function showLoading() {
        questionCard.style.display = "none";
        loadingCard.style.display = "block";
        progressBar.style.width = "100%";
        statusText.textContent = `${questions.length} / ${questions.length}`;

        setTimeout(() => {
          loadingCard.style.display = "none";
          showResult();
        }, 2000);
      }

      function showResult() {
        const type = computeType();
        const data = resultData[type];

        resultType.textContent = `최종 결과: ${type}`;
        resultNickname.textContent = data.nickname;
        resultDetail.textContent = data.detail;
        resultBest.textContent = data.best;
        resultCaution.textContent = data.caution;
        resultCard.style.display = "block";
        isAnimating = false;
      }

      function restart() {
        current = 0;
        resetScores();
        questions = buildQuestionSet();
        resultCard.style.display = "none";
        loadingCard.style.display = "none";
        questionCard.style.display = "flex";
        setQuestion(current);
        animateIn();
      }

      choiceA.addEventListener("click", () => handleChoice("A"));
      choiceB.addEventListener("click", () => handleChoice("B"));
      restartBtn.addEventListener("click", restart);

      questions = buildQuestionSet();
      setQuestion(current);
      animateIn();
    </script>
  </body>
</html>
